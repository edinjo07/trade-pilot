<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" fill="none">
  <!-- Background -->
  <rect width="900" height="360" fill="#060a0a"/>

  <!-- Ambient green glow top-left -->
  <radialGradient id="revealGlow" cx="30%" cy="40%" r="55%">
    <stop offset="0%"  stop-color="#10b981" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="360" fill="url(#revealGlow)"/>

  <!-- Grid -->
  <g stroke="#111" stroke-width="1">
    <line x1="0" y1="72"  x2="900" y2="72"/>
    <line x1="0" y1="144" x2="900" y2="144"/>
    <line x1="0" y1="216" x2="900" y2="216"/>
    <line x1="0" y1="288" x2="900" y2="288"/>
    <line x1="150" y1="0" x2="150" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="450" y1="0" x2="450" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="750" y1="0" x2="750" y2="360"/>
  </g>

  <!-- Mixed candlestick pattern (uptrend with pullbacks) -->
  <g>
    <rect x="40"  y="200" width="18" height="60"  fill="#059669" rx="2"/>
    <line x1="49"  y1="188" x2="49"  y2="268" stroke="#059669" stroke-width="1.5"/>
    <rect x="80"  y="215" width="18" height="35"  fill="#dc2626" rx="2"/>
    <line x1="89"  y1="207" x2="89"  y2="258" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="120" y="190" width="18" height="50"  fill="#059669" rx="2"/>
    <line x1="129" y1="178" x2="129" y2="248" stroke="#059669" stroke-width="1.5"/>
    <rect x="160" y="168" width="18" height="52"  fill="#059669" rx="2"/>
    <line x1="169" y1="155" x2="169" y2="228" stroke="#059669" stroke-width="1.5"/>
    <rect x="200" y="185" width="18" height="28"  fill="#dc2626" rx="2"/>
    <line x1="209" y1="176" x2="209" y2="220" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="240" y="150" width="18" height="55"  fill="#059669" rx="2"/>
    <line x1="249" y1="138" x2="249" y2="214" stroke="#059669" stroke-width="1.5"/>
    <rect x="280" y="135" width="18" height="45"  fill="#059669" rx="2"/>
    <line x1="289" y1="123" x2="289" y2="188" stroke="#059669" stroke-width="1.5"/>
    <rect x="320" y="148" width="18" height="22"  fill="#dc2626" rx="2"/>
    <line x1="329" y1="140" x2="329" y2="178" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="360" y="118" width="18" height="48"  fill="#059669" rx="2"/>
    <line x1="369" y1="106" x2="369" y2="174" stroke="#059669" stroke-width="1.5"/>
    <rect x="400" y="105" width="18" height="42"  fill="#059669" rx="2"/>
    <line x1="409" y1="94"  x2="409" y2="154" stroke="#059669" stroke-width="1.5"/>
    <rect x="440" y="118" width="18" height="20"  fill="#dc2626" rx="2"/>
    <line x1="449" y1="110" x2="449" y2="145" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="480" y="88"  width="18" height="46"  fill="#059669" rx="2"/>
    <line x1="489" y1="76"  x2="489" y2="142" stroke="#059669" stroke-width="1.5"/>
    <rect x="520" y="72"  width="18" height="40"  fill="#059669" rx="2"/>
    <line x1="529" y1="62"  x2="529" y2="120" stroke="#059669" stroke-width="1.5"/>
    <rect x="560" y="82"  width="18" height="18"  fill="#dc2626" rx="2"/>
    <line x1="569" y1="74"  x2="569" y2="108" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="600" y="58"  width="18" height="44"  fill="#059669" rx="2"/>
    <line x1="609" y1="46"  x2="609" y2="110" stroke="#059669" stroke-width="1.5"/>
    <rect x="640" y="42"  width="18" height="38"  fill="#059669" rx="2"/>
    <line x1="649" y1="30"  x2="649" y2="88"  stroke="#059669" stroke-width="1.5"/>
    <rect x="680" y="55"  width="18" height="16"  fill="#dc2626" rx="2"/>
    <line x1="689" y1="48"  x2="689" y2="78"  stroke="#dc2626" stroke-width="1.5"/>
    <rect x="720" y="30"  width="18" height="42"  fill="#059669" rx="2"/>
    <line x1="729" y1="20"  x2="729" y2="80"  stroke="#059669" stroke-width="1.5"/>
    <rect x="760" y="18"  width="18" height="36"  fill="#059669" rx="2"/>
    <line x1="769" y1="8"   x2="769" y2="62"  stroke="#059669" stroke-width="1.5"/>
    <rect x="800" y="26"  width="18" height="14"  fill="#dc2626" rx="2"/>
    <line x1="809" y1="18"  x2="809" y2="48"  stroke="#dc2626" stroke-width="1.5"/>
    <rect x="840" y="10"  width="18" height="34"  fill="#059669" rx="2"/>
    <line x1="849" y1="2"   x2="849" y2="52"  stroke="#059669" stroke-width="1.5"/>
