  <!-- Moving average lines -->
  <polyline
    points="40,230 160,195 280,158 400,128 520,88  640,55  760,30  880,18"
    stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.6"/>
  <polyline
    points="40,245 160,210 280,175 400,145 520,108 640,72  760,45  880,28"
    stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Legend -->
  <rect x="620" y="318" width="10" height="4" rx="2" fill="#f59e0b" opacity="0.7"/>
  <text x="635" y="325" font-family="sans-serif" font-size="9" fill="#6b7280">MA 20</text>
  <rect x="680" y="318" width="10" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>
  <text x="695" y="325" font-family="sans-serif" font-size="9" fill="#6b7280">MA 50</text>

  <!-- Price label -->
  <rect x="820" y="6" width="66" height="22" rx="4" fill="#10b981"/>
  <text x="853" y="21" font-family="monospace" font-size="11" fill="#000" text-anchor="middle" font-weight="bold">+24.1%</text>

  <!-- Top fade -->
  <linearGradient id="topFadeG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#060a0a" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#060a0a" stop-opacity="0"/>
