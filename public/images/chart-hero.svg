<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <!-- Background -->
  <rect width="900" height="400" fill="#0a0a0a"/>

  <!-- Ambient glow -->
  <radialGradient id="glow1" cx="50%" cy="60%" r="55%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="400" fill="url(#glow1)"/>

  <!-- Grid lines -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
  </g>

  <!-- Area chart fill -->
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  <path d="M0,320 L60,280 L120,295 L180,260 L240,240 L300,250 L360,200 L420,180 L480,155 L540,160 L600,130 L660,110 L720,90  L780,75  L840,60  L900,50  L900,400 L0,400 Z" fill="url(#areaGrad)"/>

  <!-- Line chart -->
  <polyline
    points="0,320 60,280 120,295 180,260 240,240 300,250 360,200 420,180 480,155 540,160 600,130 660,110 720,90 780,75 840,60 900,50"
    stroke="#10b981" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Candlesticks (bearish = red, bullish = green) -->
  <!-- Candle 1 - green -->
  <rect x="60"  y="240" width="16" height="45"  fill="#059669" rx="2"/>
  <line x1="68"  y1="230" x2="68"  y2="290" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 2 - red -->
  <rect x="110" y="255" width="16" height="35" fill="#dc2626" rx="2"/>
  <line x1="118" y1="248" x2="118" y2="298" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Candle 3 - green -->
  <rect x="160" y="220" width="16" height="50" fill="#059669" rx="2"/>
  <line x1="168" y1="208" x2="168" y2="278" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 4 - green -->
  <rect x="210" y="200" width="16" height="48" fill="#059669" rx="2"/>
  <line x1="218" y1="190" x2="218" y2="256" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 5 - red -->
  <rect x="260" y="228" width="16" height="32" fill="#dc2626" rx="2"/>
  <line x1="268" y1="220" x2="268" y2="268" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Candle 6 - green -->
  <rect x="310" y="185" width="16" height="55" fill="#059669" rx="2"/>
  <line x1="318" y1="172" x2="318" y2="248" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 7 - green big -->
  <rect x="360" y="160" width="16" height="50" fill="#059669" rx="2"/>
  <line x1="368" y1="148" x2="368" y2="218" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 8 - red -->
  <rect x="410" y="175" width="16" height="28" fill="#dc2626" rx="2"/>
  <line x1="418" y1="166" x2="418" y2="210" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Candle 9 - green -->
  <rect x="460" y="140" width="16" height="42" fill="#059669" rx="2"/>
  <line x1="468" y1="128" x2="468" y2="190" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 10 - green -->
  <rect x="510" y="130" width="16" height="40" fill="#059669" rx="2"/>
  <line x1="518" y1="118" x2="518" y2="178" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 11 - red -->
  <rect x="560" y="140" width="16" height="22" fill="#dc2626" rx="2"/>
  <line x1="568" y1="132" x2="568" y2="170" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Candle 12 - green -->
  <rect x="610" y="105" width="16" height="38" fill="#059669" rx="2"/>
  <line x1="618" y1="95" x2="618" y2="150" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 13 - green -->
  <rect x="660" y="88"  width="16" height="35" fill="#059669" rx="2"/>
  <line x1="668" y1="76" x2="668" y2="130" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 14 - green -->
  <rect x="710" y="70"  width="16" height="30" fill="#059669" rx="2"/>
  <line x1="718" y1="60" x2="718" y2="108" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 15 - red -->
  <rect x="760" y="78"  width="16" height="20" fill="#dc2626" rx="2"/>
  <line x1="768" y1="70" x2="768" y2="104" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Candle 16 - green -->
  <rect x="810" y="55"  width="16" height="32" fill="#059669" rx="2"/>
  <line x1="818" y1="44" x2="818" y2="96" stroke="#059669" stroke-width="1.5"/>
  <!-- Candle 17 - green -->
  <rect x="860" y="38"  width="16" height="28" fill="#059669" rx="2"/>
  <line x1="868" y1="28" x2="868" y2="74" stroke="#059669" stroke-width="1.5"/>

  <!-- Volume bars at bottom -->
  <g opacity="0.35">
    <rect x="60"  y="370" width="16" height="18" fill="#059669" rx="1"/>
    <rect x="110" y="365" width="16" height="23" fill="#dc2626" rx="1"/>
    <rect x="160" y="360" width="16" height="28" fill="#059669" rx="1"/>
    <rect x="210" y="368" width="16" height="20" fill="#059669" rx="1"/>
    <rect x="260" y="373" width="16" height="15" fill="#dc2626" rx="1"/>
    <rect x="310" y="355" width="16" height="33" fill="#059669" rx="1"/>
    <rect x="360" y="358" width="16" height="30" fill="#059669" rx="1"/>
    <rect x="410" y="370" width="16" height="18" fill="#dc2626" rx="1"/>
    <rect x="460" y="356" width="16" height="32" fill="#059669" rx="1"/>
    <rect x="510" y="362" width="16" height="26" fill="#059669" rx="1"/>
    <rect x="560" y="374" width="16" height="14" fill="#dc2626" rx="1"/>
    <rect x="610" y="352" width="16" height="36" fill="#059669" rx="1"/>
    <rect x="660" y="357" width="16" height="31" fill="#059669" rx="1"/>
    <rect x="710" y="363" width="16" height="25" fill="#059669" rx="1"/>
    <rect x="760" y="368" width="16" height="20" fill="#dc2626" rx="1"/>
    <rect x="810" y="350" width="16" height="38" fill="#059669" rx="1"/>
    <rect x="860" y="354" width="16" height="34" fill="#059669" rx="1"/>
  </g>

  <!-- Price label -->
  <rect x="820" y="28" width="70" height="22" rx="4" fill="#10b981" opacity="0.9"/>
  <text x="855" y="43" font-family="monospace" font-size="11" fill="#000" text-anchor="middle" font-weight="bold">+18.4%</text>

  <!-- Subtle top fade -->
  <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#0a0a0a" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </linearGradient>
  <rect width="900" height="60" fill="url(#topFade)"/>
</svg>
