<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" fill="none">
  <defs>
    <!-- bar gradient -->
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#b07500"/>
      <stop offset="60%"  stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#f5b523"/>
    </linearGradient>
    <!-- wordmark gold gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f5b523"/>
      <stop offset="100%" stop-color="#fad060"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (44×44, offset y=4 to center in 52px height) ──────────── -->
  <g transform="translate(0, 4)">
    <!-- dark navy background -->
    <rect width="44" height="44" rx="10" fill="#07090f"/>
    <!-- inner border glow -->
    <rect width="44" height="44" rx="10" fill="none" stroke="#f0a500" stroke-width="0.6" opacity="0.25"/>

    <!-- chart bars — baseline at y=39 -->
    <rect x="4"  y="29" width="5.5" height="10" rx="1.5" fill="url(#bars)" opacity="0.52"/>
    <rect x="12" y="21" width="5.5" height="18" rx="1.5" fill="url(#bars)" opacity="0.70"/>
    <rect x="20" y="25" width="5.5" height="14" rx="1.5" fill="url(#bars)" opacity="0.86"/>
    <rect x="28" y="12" width="5.5" height="27" rx="1.5" fill="url(#bars)"/>

    <!-- trend line connecting bar tops -->
    <polyline
      points="6.75,29 14.75,21 22.75,25 30.75,12"
      fill="none"
      stroke="#fbbf24"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- connector from last bar top to arrowhead -->
    <line x1="30.75" y1="12" x2="37" y2="5.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>

    <!-- pilot arrowhead tip -->
    <polygon points="40,4 34,8 36.5,12.5" fill="#fbbf24"/>
  </g>

  <!-- ── Wordmark ────────────────────────────────────────────────────────── -->
  <text
    x="54"
    y="30"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="22"
    letter-spacing="-0.4"
  >
    <tspan font-weight="400" fill="#f0f4ff">Trade</tspan><tspan font-weight="800" fill="url(#gold)">Pilot</tspan>
  </text>

  <!-- tagline -->
  <text
    x="55"
    y="45"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="0.6"
    fill="#4e5d7a"
  >YOUR AUTOPILOT FOR THE MARKETS</text>
</svg>
