<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" fill="none">
  <!-- Dark background -->
  <rect width="900" height="360" fill="#050505"/>

  <!-- Ambient red glow -->
  <radialGradient id="urgencyGlow" cx="50%" cy="50%" r="60%">
    <stop offset="0%"  stop-color="#ef4444" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="360" fill="url(#urgencyGlow)"/>

  <!-- Grid -->
  <g stroke="#141414" stroke-width="1">
    <line x1="0" y1="72"  x2="900" y2="72"/>
    <line x1="0" y1="144" x2="900" y2="144"/>
    <line x1="0" y1="216" x2="900" y2="216"/>
    <line x1="0" y1="288" x2="900" y2="288"/>
    <line x1="180" y1="0" x2="180" y2="360"/>
    <line x1="360" y1="0" x2="360" y2="360"/>
    <line x1="540" y1="0" x2="540" y2="360"/>
    <line x1="720" y1="0" x2="720" y2="360"/>
  </g>

  <!-- Downtrend area -->
  <defs>
    <linearGradient id="downArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M0,80 L100,100 L200,90 L300,130 L400,150 L500,140 L600,190 L700,210 L800,240 L900,280 L900,360 L0,360 Z" fill="url(#downArea)"/>

  <!-- Downtrend line -->
  <polyline points="0,80 100,100 200,90 300,130 400,150 500,140 600,190 700,210 800,240 900,280"
    stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Red candles (downtrend) -->
  <g>
    <!-- c1 -->
    <rect x="50"  y="72"  width="16" height="38"  fill="#dc2626" rx="2"/>
    <line x1="58"  y1="62"  x2="58"  y2="118" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c2 -->
    <rect x="100" y="85"  width="16" height="30"  fill="#dc2626" rx="2"/>
    <line x1="108" y1="75"  x2="108" y2="122" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c3 green brief -->
    <rect x="150" y="78"  width="16" height="22"  fill="#059669" rx="2"/>
    <line x1="158" y1="70"  x2="158" y2="106" stroke="#059669" stroke-width="1.5"/>
    <!-- c4 red -->
    <rect x="200" y="110" width="16" height="40"  fill="#dc2626" rx="2"/>
    <line x1="208" y1="99"  x2="208" y2="158" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c5 red -->
    <rect x="250" y="125" width="16" height="35"  fill="#dc2626" rx="2"/>
    <line x1="258" y1="115" x2="258" y2="168" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c6 green -->
    <rect x="300" y="118" width="16" height="20"  fill="#059669" rx="2"/>
    <line x1="308" y1="110" x2="308" y2="145" stroke="#059669" stroke-width="1.5"/>
    <!-- c7 red big -->
    <rect x="350" y="138" width="16" height="48"  fill="#dc2626" rx="2"/>
    <line x1="358" y1="126" x2="358" y2="194" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c8 red -->
    <rect x="400" y="156" width="16" height="30"  fill="#dc2626" rx="2"/>
    <line x1="408" y1="146" x2="408" y2="194" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c9 green -->
    <rect x="450" y="148" width="16" height="18"  fill="#059669" rx="2"/>
    <line x1="458" y1="140" x2="458" y2="173" stroke="#059669" stroke-width="1.5"/>
    <!-- c10 red -->
    <rect x="500" y="165" width="16" height="42"  fill="#dc2626" rx="2"/>
    <line x1="508" y1="153" x2="508" y2="215" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c11 red -->
    <rect x="550" y="185" width="16" height="38"  fill="#dc2626" rx="2"/>
    <line x1="558" y1="174" x2="558" y2="231" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c12 green -->
    <rect x="600" y="178" width="16" height="20"  fill="#059669" rx="2"/>
    <line x1="608" y1="170" x2="608" y2="206" stroke="#059669" stroke-width="1.5"/>
    <!-- c13 red -->
    <rect x="650" y="202" width="16" height="44"  fill="#dc2626" rx="2"/>
    <line x1="658" y1="191" x2="658" y2="254" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c14 red -->
    <rect x="700" y="225" width="16" height="36"  fill="#dc2626" rx="2"/>
    <line x1="708" y1="214" x2="708" y2="269" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c15 green -->
    <rect x="750" y="218" width="16" height="22"  fill="#059669" rx="2"/>
    <line x1="758" y1="210" x2="758" y2="247" stroke="#059669" stroke-width="1.5"/>
    <!-- c16 red big -->
    <rect x="800" y="244" width="16" height="52"  fill="#dc2626" rx="2"/>
    <line x1="808" y1="232" x2="808" y2="304" stroke="#dc2626" stroke-width="1.5"/>
    <!-- c17 red -->
    <rect x="850" y="265" width="16" height="40"  fill="#dc2626" rx="2"/>
    <line x1="858" y1="254" x2="858" y2="313" stroke="#dc2626" stroke-width="1.5"/>
  </g>

  <!-- Price down label -->
  <rect x="810" y="260" width="74" height="22" rx="4" fill="#dc2626" opacity="0.9"/>
  <text x="847" y="275" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">-12.7%</text>

  <!-- Top fade -->
  <linearGradient id="topFadeR" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#050505" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
  </linearGradient>
  <rect width="900" height="55" fill="url(#topFadeR)"/>
</svg>
