<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" fill="none">
  <!-- BG -->
  <rect width="900" height="360" fill="#080a06"/>

  <!-- Ambient glows -->
  <radialGradient id="gRed" cx="75%" cy="55%" r="40%">
    <stop offset="0%" stop-color="#ef4444" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="360" fill="url(#gRed)"/>
  <radialGradient id="gAmber" cx="25%" cy="40%" r="35%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="360" fill="url(#gAmber)"/>

  <!-- Grid -->
  <g stroke="#131313" stroke-width="1">
    <line x1="0" y1="72"  x2="900" y2="72"/>
    <line x1="0" y1="144" x2="900" y2="144"/>
    <line x1="0" y1="216" x2="900" y2="216"/>
    <line x1="0" y1="288" x2="900" y2="288"/>
    <line x1="150" y1="0" x2="150" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="450" y1="0" x2="450" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="750" y1="0" x2="750" y2="360"/>
  </g>

  <!-- Area chart (declining → alarm) -->
  <defs>
    <linearGradient id="areaRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  <path d="M0,80 L80,75 L140,90 L200,85 L260,100 L320,88 L380,110 L440,130 L500,200 L560,240 L620,270 L680,295 L740,310 L800,325 L860,335 L900,340 L900,360 L0,360 Z" fill="url(#areaRed)"/>
  <polyline points="0,80 80,75 140,90 200,85 260,100 320,88 380,110 440,130 500,200 560,240 620,270 680,295 740,310 800,325 860,335 900,340"
    stroke="#ef4444" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Candlesticks: bullish phase left, bearish right -->
  <!-- Green cluster left -->
  <rect x="55"  y="68"  width="14" height="16" fill="#059669" rx="2"/>
  <line x1="62"  y1="60"  x2="62"  y2="90"  stroke="#059669" stroke-width="1.5"/>
  <rect x="95"  y="72"  width="14" height="20" fill="#059669" rx="2"/>
  <line x1="102" y1="64"  x2="102" y2="97"  stroke="#059669" stroke-width="1.5"/>
  <rect x="135" y="82"  width="14" height="14" fill="#059669" rx="2"/>
  <line x1="142" y1="75"  x2="142" y2="102" stroke="#059669" stroke-width="1.5"/>

  <!-- Mixed middle -->
  <rect x="175" y="80"  width="14" height="14" fill="#059669" rx="2"/>
  <line x1="182" y1="72"  x2="182" y2="100" stroke="#059669" stroke-width="1.5"/>
  <rect x="215" y="88"  width="14" height="18" fill="#dc2626" rx="2"/>
  <line x1="222" y1="80"  x2="222" y2="112" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="255" y="82"  width="14" height="14" fill="#059669" rx="2"/>
  <line x1="262" y1="76"  x2="262" y2="102" stroke="#059669" stroke-width="1.5"/>
  <rect x="295" y="82"  width="14" height="10" fill="#dc2626" rx="2"/>
  <line x1="302" y1="76"  x2="302" y2="98"  stroke="#dc2626" stroke-width="1.5"/>

  <!-- Breakdown bearish cluster right -->
  <rect x="375" y="105" width="14" height="22" fill="#dc2626" rx="2"/>
  <line x1="382" y1="95"  x2="382" y2="134" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="415" y="125" width="14" height="28" fill="#dc2626" rx="2"/>
  <line x1="422" y1="115" x2="422" y2="160" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="455" y="188" width="14" height="30" fill="#dc2626" rx="2"/>
  <line x1="462" y1="178" x2="462" y2="225" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="495" y="230" width="14" height="28" fill="#dc2626" rx="2"/>
  <line x1="502" y1="220" x2="502" y2="264" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Large red candle highlight + volume spike -->
  <rect x="540" y="225" width="18" height="42" fill="#ef4444" rx="2"/>
  <line x1="549" y1="210" x2="549" y2="272" stroke="#ef4444" stroke-width="2"/>
  <rect x="540" y="330" width="18" height="25" fill="#ef4444" rx="2" opacity="0.35"/>

  <!-- Countdown clock icon (top right) -->
  <circle cx="820" cy="60" r="32" fill="#0f1208" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="820" cy="60" r="24" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Clock hands -->
  <line x1="820" y1="60" x2="820" y2="42" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="820" y1="60" x2="834" y2="67" stroke="#ef4444" stroke-width="2"   stroke-linecap="round"/>
  <circle cx="820" cy="60" r="2.5" fill="#f59e0b"/>

  <!-- Warning label -->
  <rect x="320" y="18" width="230" height="28" rx="6" fill="#1c0a00" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <text x="340" y="36" font-family="monospace" font-size="12" fill="#f59e0b" font-weight="bold">⚠ SPOT AVAILABILITY DROPPING</text>

  <!-- Price labels right edge -->
  <text x="860" y="80"  font-family="monospace" font-size="10" fill="#6b7280">1.2840</text>
  <text x="860" y="150" font-family="monospace" font-size="10" fill="#6b7280">1.2780</text>
  <text x="860" y="220" font-family="monospace" font-size="10" fill="#6b7280">1.2720</text>
  <text x="860" y="290" font-family="monospace" font-size="10" fill="#6b7280">1.2660</text>
</svg>
