  <text x="330" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Balance</text>
  <text x="330" y="97" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#f9fafb" text-anchor="middle">$12,840</text>

  <!-- Chart area background -->
  <rect x="0" y="122" width="290" height="108" fill="#0f111a"/>

  <!-- Grid lines -->
  <line x1="0" y1="138" x2="290" y2="138" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="0" y1="158" x2="290" y2="158" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="0" y1="178" x2="290" y2="178" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="0" y1="198" x2="290" y2="198" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="0" y1="218" x2="290" y2="218" stroke="#1e2028" stroke-width="0.6"/>
  <!-- Vertical grid -->
  <line x1="60" y1="122" x2="60" y2="230" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="120" y1="122" x2="120" y2="230" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="180" y1="122" x2="180" y2="230" stroke="#1e2028" stroke-width="0.6"/>
  <line x1="240" y1="122" x2="240" y2="230" stroke="#1e2028" stroke-width="0.6"/>

  <!-- Price labels right axis -->
  <text x="296" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">1.0910</text>
  <text x="296" y="161" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">1.0890</text>
  <text x="296" y="181" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">1.0870</text>
  <text x="296" y="201" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">1.0850</text>

  <!-- Chart fill area -->
  <path d="M8,205 C20,202 28,196 36,190 C44,184 50,176 60,168 C70,160 76,158 86,152 C96,146 102,148 112,142 C122,136 128,130 140,128 C152,126 158,130 168,134 C178,138 184,136 196,132 C208,128 214,130 224,134 C234,138 240,140 250,136 C260,132 268,134 278,130 L278,230 L8,230 Z" fill="url(#chartFill)"/>
  <!-- Chart line -->
  <path d="M8,205 C20,202 28,196 36,190 C44,184 50,176 60,168 C70,160 76,158 86,152 C96,146 102,148 112,142 C122,136 128,130 140,128 C152,126 158,130 168,134 C178,138 184,136 196,132 C208,128 214,130 224,134 C234,138 240,140 250,136 C260,132 268,134 278,130" stroke="url(#chartLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Current price dot + horizontal line -->
  <line x1="0" y1="130" x2="278" y2="130" stroke="#34d399" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <circle cx="278" cy="130" r="4" fill="#34d399"/>
  <circle cx="278" cy="130" r="7" fill="#34d399" opacity="0.2"/>

  <!-- Candlesticks (last 6 visible ones overlaid for realism) -->
  <!-- Bearish candle -->
  <line x1="44" y1="182" x2="44" y2="196" stroke="#f87171" stroke-width="1"/>
  <rect x="40" y="184" width="8" height="8" fill="#f87171" rx="1"/>
  <!-- Bullish -->
  <line x1="56" y1="170" x2="56" y2="183" stroke="#34d399" stroke-width="1"/>
  <rect x="52" y="172" width="8" height="8" fill="#34d399" rx="1"/>
  <!-- Bearish -->
  <line x1="68" y1="163" x2="68" y2="176" stroke="#f87171" stroke-width="1"/>
  <rect x="64" y="165" width="8" height="7" fill="#f87171" rx="1"/>
  <!-- Bullish big -->
  <line x1="80" y1="150" x2="80" y2="167" stroke="#34d399" stroke-width="1"/>
  <rect x="76" y="152" width="8" height="12" fill="#34d399" rx="1"/>
  <!-- Bullish -->
  <line x1="92" y1="144" x2="92" y2="157" stroke="#34d399" stroke-width="1"/>
  <rect x="88" y="146" width="8" height="8" fill="#34d399" rx="1"/>

  <!-- Time labels -->
  <text x="8" y="243" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">09:00</text>
  <text x="55" y="243" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">10:00</text>
  <text x="115" y="243" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">11:00</text>
  <text x="175" y="243" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">12:00</text>
  <text x="235" y="243" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#4b5563">13:00</text>

  <!-- Right panel: trade panel -->
  <rect x="290" y="122" width="100" height="108" fill="#16181f"/>

  <!-- P&L today block -->
  <rect x="296" y="127" width="88" height="38" rx="6" fill="#0f2818"/>
  <text x="340" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">P&amp;L Today</text>
  <text x="340" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="800" fill="#34d399" text-anchor="middle">+$312.40</text>

  <!-- Open position -->
  <rect x="296" y="170" width="88" height="28" rx="6" fill="#1e2028"/>
  <text x="340" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">Open Position</text>
  <text x="340" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">BUY 0.5 lot</text>

  <!-- Timeframe tabs -->
  <rect x="296" y="202" width="88" height="22" rx="5" fill="#1e2028"/>
  <rect x="297" y="203" width="18" height="20" rx="4" fill="#f0a500"/>
  <text x="306" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#000" text-anchor="middle">1H</text>
  <text x="324" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">4H</text>
  <text x="342" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">1D</text>
  <text x="360" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">1W</text>

  <!-- Bottom buy/sell bar -->
  <rect x="0" y="230" width="390" height="30" fill="#13151c"/>
  <!-- SELL button -->
  <rect x="8" y="234" width="140" height="22" rx="6" fill="#ef4444"/>
  <text x="78" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="800" fill="white" text-anchor="middle">SELL  1.08718</text>
  <!-- Spread -->
  <text x="197" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">0.4 pip</text>
  <!-- BUY button -->
  <rect x="242" y="234" width="140" height="22" rx="6" fill="url(#goldGrad)"/>
  <text x="312" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="800" fill="#000" text-anchor="middle">BUY  1.08742</text>
</svg>
