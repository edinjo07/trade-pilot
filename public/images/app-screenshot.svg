<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 260" width="390" height="260">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#111218"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <clipPath id="chartClip">
      <rect x="12" y="120" width="266" height="100" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="390" height="260" fill="url(#bgGrad)"/>

  <!-- Status bar -->
  <text x="16" y="18" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e5e7eb">9:41</text>
  <!-- Battery -->
  <rect x="352" y="8" width="26" height="13" rx="3" fill="none" stroke="#6b7280" stroke-width="1.2"/>
  <rect x="378" y="11" width="2.5" height="7" rx="1" fill="#6b7280"/>
  <rect x="353.5" y="9.5" width="20" height="10" rx="2" fill="#34d399"/>
  <!-- Signal bars -->
  <rect x="330" y="15" width="3" height="6" rx="1" fill="#9ca3af"/>
  <rect x="335" y="12" width="3" height="9" rx="1" fill="#9ca3af"/>
  <rect x="340" y="9" width="3" height="12" rx="1" fill="#9ca3af"/>
  <!-- Wifi -->
  <path d="M318 18 Q322 14 326 18" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
  <path d="M320 20.5 Q322 18.5 324 20.5" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
  <circle cx="322" cy="23" r="1.2" fill="#9ca3af"/>

  <!-- App header -->
  <rect x="0" y="26" width="390" height="44" fill="#16181f"/>
  <!-- Back arrow + pair name -->
  <path d="M18 43 L10 48 L18 53" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <text x="30" y="51" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#f9fafb">EUR/USD</text>
  <text x="100" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#34d399">● LIVE</text>
  <!-- Right: notifications -->
  <circle cx="370" cy="48" r="12" fill="#1e2028"/>
  <text x="370" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#9ca3af">⚙</text>

  <!-- Price display row -->
  <rect x="0" y="70" width="390" height="52" fill="#13151c"/>
  <text x="16" y="91" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="#f9fafb" letter-spacing="-0.5">1.08 742</text>
  <text x="170" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#34d399">▲ +0.0038</text>
  <text x="170" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280">+0.35% today</text>
  <!-- Sparkline mini -->
  <polyline points="260,90 268,86 275,88 282,83 290,79 297,81 305,76" stroke="#34d399" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
